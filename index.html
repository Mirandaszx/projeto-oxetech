<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario de Treino Iron Pump</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-display: "Space Grotesk", sans-serif;
            --font-body: "Manrope", sans-serif;
            --color-coal-950: #070707;
            --color-coal-900: #111111;
            --color-coal-800: #181412;
            --color-coal-700: #241c18;
            --color-ember-200: #f8c7a7;
            --color-ember-300: #f2ab7a;
            --color-ember-400: #e88a4a;
            --color-ember-500: #c76a2d;
            --color-ember-600: #9e4f1f;
            --color-ember-700: #783815;
        }

        @layer base {
            body {
                @apply bg-coal-950 font-body text-stone-100 antialiased;
            }
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-x-hidden selection:bg-ember-400/30 selection:text-white">
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>
    <div id="app"></div>
    <script src="js/app.js"></script>
</body>
</html>
